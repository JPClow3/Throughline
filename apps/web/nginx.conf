server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    image/svg+xml application/manifest+json;

  # Long-lived, immutable cache for fingerprinted build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the service worker, the app shell, or the manifest so PWA
  # updates propagate immediately (vite-plugin-pwa autoUpdate).
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    types { } default_type application/manifest+json;
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback — every unknown route serves the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
