<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eef0f4" />
    <meta name="description" content="Throughline is a calm place to plan. A task manager and planner that helps you focus." />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Throughline — a calm place to plan</title>
    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var pref = localStorage.getItem("lg-theme") || "light";
          var dark =
            pref === "dark" ||
            (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
